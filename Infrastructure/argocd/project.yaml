apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: recybot-frontends
  namespace: argocd
spec:
  description: RecyBot frontend workloads for the Ecosystem cluster
  sourceRepos:
    - https://github.com/Ocx-Group/recybot-web
  destinations:
    - namespace: ecosystem
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
