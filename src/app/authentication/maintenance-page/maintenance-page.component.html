<main class="main-container">

  <!-- Background FX -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-scanline" aria-hidden="true"></div>

  <div class="maint-card">

    <!-- Status indicator -->
    <div class="maint-status">
      <span class="maint-status__dot"></span>
      Sistema en mantenimiento
    </div>

    <!-- Animated icon -->
    <div class="maint-icon-wrap">
      <i class="bi bi-tools maint-icon"></i>
    </div>

    <!-- Title & description -->
    <h1 class="maint-title">Mantenimiento</h1>
    <p class="maint-description">
      Estamos trabajando en mejoras del sistema.<br>
      Pronto estará disponible nuevamente.
    </p>

    <div class="maint-divider"></div>

    <!-- Progress -->
    <div class="maint-progress">
      <div class="maint-progress__label">
        <span>Progreso</span>
        <span>72%</span>
      </div>
      <div class="maint-progress__track">
        <div class="maint-progress__fill"></div>
      </div>
    </div>

    <!-- Back link -->
    <a routerLink="/" class="maint-back">
      <i class="bi bi-arrow-left"></i>
      Volver al inicio
    </a>

  </div>
</main>
